```yml
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */24 * * *"

  workflow_dispatch:

jobs:
  generate:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest

    permissions:
      contents: write

    timeout-minutes: 10

    steps:
      - name: Generate warm-tone snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: shreya661
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ffb347&color_dots=#2d1b0f,#5c2c06,#8c4a0f,#c96b1a,#ffb347

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
